<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlyTunnel</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="panel left-column">
        <header class="compact-header">
          <div class="brand-row">
            <img src="/assets/flytunnel-mark.svg" alt="FlyTunnel mark" class="brand-mark" />
            <div class="brand-copy">
              <h1>FlyTunnel</h1>
              <p class="eyebrow">LAN Tunnel Utility</p>
            </div>
          </div>
        </header>

        <form id="tunnel-form" novalidate>
          <input id="frpc-path-override" type="hidden" />

          <label class="field">
            <span>VPS Host / IP</span>
            <input id="server-addr" type="text" placeholder="123.45.67.89 or play.example.com" autocomplete="off" />
          </label>

          <label class="field">
            <span>Token</span>
            <input id="token" type="password" placeholder="Your frps auth token" autocomplete="current-password" />
          </label>

          <label class="field">
            <span>Local Port</span>
            <input id="local-port" type="number" min="1" max="65535" value="25565" />
          </label>

          <div class="action-row">
            <button type="submit" class="primary-btn" id="start-button">Start Tunnel</button>
            <button type="button" class="danger-btn" id="stop-button" disabled>Stop Tunnel</button>
          </div>

          <details class="advanced-panel">
            <summary>
              <span class="advanced-title">Advanced</span>
              <span class="advanced-copy">Control port, remote port, frpc path</span>
            </summary>

            <div class="advanced-body">
              <div class="field-row">
                <label class="field">
                  <span>Control Port</span>
                  <input id="server-port" type="number" min="1" max="65535" value="7000" />
                </label>
                <label class="field">
                  <span>Remote Port</span>
                  <input id="remote-port" type="number" min="1" max="65535" value="25565" />
                </label>
              </div>

              <div class="binary-card">
                <div class="binary-copy">
                  <span class="binary-label">frpc Client</span>
                  <code id="frpc-path">Auto-download when needed</code>
                  <p id="binary-note">FlyTunnel will fetch the official binary if it is missing.</p>
                </div>
                <button type="button" class="secondary-btn" id="pick-binary">Locate frpc</button>
              </div>
            </div>
          </details>
        </form>
      </section>

      <section class="panel right-column">
        <section class="status-card compact-card">
          <div class="group-label">Status</div>
          <div class="status-topline">
            <div class="status-pill stopped" id="status-pill">
              <span class="status-dot"></span>
              <span id="status-text">Stopped</span>
            </div>
          </div>
          <p class="status-detail" id="status-detail">Ready when you are.</p>
        </section>

        <section class="join-card compact-card">
          <div class="group-label">Join</div>
          <span class="join-label">Join Address</span>
          <strong id="join-address">your-vps:25565</strong>
        </section>

        <section class="log-card">
          <div class="group-label">Log</div>
          <div class="panel-head">
            <h2>Recent Activity</h2>
            <p>Realtime frpc output.</p>
          </div>
          <div id="log-box" aria-live="polite">
            <pre id="log-content"></pre>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>

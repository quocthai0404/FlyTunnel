name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run UI helper tests
        run: npm run test:ui

      - name: Run backend and acceptance tests
        run: cargo test --manifest-path src-tauri/Cargo.toml -- --nocapture

      - name: Build release bundle
        run: npm run build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flytunnel-${{ matrix.os }}
          path: |
            src-tauri/target/release/flytunnel*
            src-tauri/target/release/bundle/**
